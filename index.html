    <style amp-custom>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --color-primary: #6900ff;
        --color-accent: #76df9b;
        --color-bg: #000000;
        --text-white: #ffffff;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, monospace;
        background: var(--color-bg);
        background-image: 
          radial-gradient(rgba(255, 255, 255, 0.15) 1px, transparent 1px),
          radial-gradient(rgba(255, 255, 255, 0.1) 1px, transparent 1px);
        background-size: 40px 40px, 80px 80px;
        background-position: 0 0, 20px 20px;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 15px;
        color: var(--text-white);
      }

      body::before {
        content: '';
        position: fixed;
        inset: 0;
        background: 
          radial-gradient(circle at 20% 30%, rgba(255, 255, 255, 0.08), transparent 40%),
          radial-gradient(circle at 80% 70%, rgba(255, 215, 0, 0.1), transparent 50%);
        pointer-events: none;
        z-index: -1;
        animation: pulseBg 8s ease-in-out infinite;
      }

      @keyframes pulseBg {
        0%, 100% { opacity: 0.5; }
        50% { opacity: 1; }
      }

      .container {
        max-width: 420px;
        width: 100%;
        margin: 0 auto;
        padding: 25px 20px;
        display: flex;
        flex-direction: column;
        gap: 15px;
        background: rgba(10, 8, 2, 0.85);
        backdrop-filter: blur(10px);
        border: 2px solid rgba(255, 255, 255, 0.3);
        border-radius: 30px;
        box-shadow: 
          0 0 0 1px rgba(255, 255, 255, 0.1),
          0 20px 40px rgba(0, 0, 0, 0.8),
          inset 0 0 30px rgba(255, 255, 255, 0.1);
        position: relative;
        overflow: hidden;
        animation: fadeInUp 0.8s ease;
      }

      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      header {
        display: flex;
        justify-content: center;
        width: 100%;
      }

      .welcome {
        text-align: center;
        margin: 0 auto;
        width: 100%;
      }

      .welcome h1 {
        font-size: 14px;
        color: var(--color-accent);
        letter-spacing: 1.5px;
        text-transform: uppercase;
        font-weight: 700;
        text-shadow: 0 0 10px rgba(118, 223, 155, 0.5);
      }

      .banner {
        border-radius: 20px;
        overflow: hidden;
        box-shadow: 
          0 10px 20px rgba(0, 0, 0, 0.5),
          0 0 0 2px rgba(255, 255, 255, 0.3);
      }

      .btn-action {
        display: block;
        padding: 16px;
        font-size: 18px;
        font-weight: 800;
        text-decoration: none;
        text-align: center;
        border-radius: 50px;
        text-transform: uppercase;
        letter-spacing: 2px;
        transition: transform 0.2s ease, filter 0.2s ease;
        color: #ffffff;
      }

      .btn-login {
        background: linear-gradient(145deg, #6900ff, #76df9b);
        border: 1px solid var(--color-primary);
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.7);
      }

      .btn-daftar {
        background: linear-gradient(145deg, #76df9b, #6900ff);
        border: 1px solid var(--color-accent);
        box-shadow: 0 5px 20px rgba(255, 255, 255, 0.2);
      }

      .btn-action:hover {
        transform: translateY(-2px);
        filter: brightness(1.15);
      }

      .button-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 10px;
        margin-top: 5px;
      }

      .button-grid a {
        display: block;
        padding: 12px;
        font-size: 13px;
        font-weight: 700;
        text-decoration: none;
        text-align: center;
        border-radius: 40px;
        background: linear-gradient(135deg, #110d22, #6900ff);
        border: 1px solid rgba(255, 255, 255, 0.3);
        color: #ffffff;
        text-transform: uppercase;
        letter-spacing: 1px;
        transition: transform 0.2s ease;
      }

      .button-grid a:hover {
        transform: translateY(-2px);
        border-color: var(--color-accent);
      }

      .code-box {
        background: rgba(255, 255, 255, 0.05);
        padding: 10px;
        border-radius: 10px;
        margin-top: 5px;
        text-align: center;
        border: 1px dashed rgba(255, 255, 255, 0.2);
        word-break: break-all;
      }

      .code-box span {
        color: #e0e0e0;
        font-size: 11px;
      }

      .copyright {
        text-align: center;
        color: rgba(255, 255, 255, 0.7);
        font-size: 12px;
        margin-top: 10px;
        border-top: 1px solid rgba(255, 255, 255, 0.15);
        padding-top: 12px;
      }

      .copyright strong {
        color: var(--color-accent);
        font-weight: 800;
      }

      .color-sparkle {
        position: fixed;
        pointer-events: none;
        inset: 0;
        z-index: 9999;
      }

      .color-sparkle span {
        position: absolute;
        width: 6px;
        height: 6px;
        background: var(--color-accent);
        border-radius: 50%;
        box-shadow: 0 0 15px var(--color-accent);
        animation: sparkle 3s ease-in-out infinite;
        opacity: 0;
      }

      @keyframes sparkle {
        0%, 100% { transform: scale(0); opacity: 0; }
        50% { transform: scale(1); opacity: 0.8; }
      }

      .color-sparkle span:nth-child(1) { top: 10%; left: 20%; animation-delay: 0s; }
      .color-sparkle span:nth-child(2) { top: 30%; left: 80%; animation-delay: 1s; }
      .color-sparkle span:nth-child(3) { top: 70%; left: 40%; animation-delay: 2s; }
      .color-sparkle span:nth-child(4) { top: 85%; left: 70%; animation-delay: 1.5s; }
      .color-sparkle span:nth-child(5) { top: 45%; left: 15%; animation-delay: 2.5s; }
    </style>
